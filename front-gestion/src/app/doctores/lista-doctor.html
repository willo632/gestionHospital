<div class="page">

  <!-- Encabezado -->
  <div class="page-header">
    <div class="page-title">
      <mat-icon>medical_services</mat-icon>
      <h1>Doctores</h1>
    </div>
    <button mat-flat-button color="primary" (click)="abrirDialog()">
      <mat-icon>person_add</mat-icon> Nuevo doctor
    </button>
  </div>

  <mat-card>
    <mat-card-content>
      <mat-form-field appearance="outline" class="search-field">
        <mat-label>Buscar doctor</mat-label>
        <mat-icon matPrefix>search</mat-icon>
        <input matInput (input)="filtrar($event)" placeholder="Nombre, apellido, especialidad…">
      </mat-form-field>
    </mat-card-content>

    @if (loading()) {
      <mat-progress-bar mode="indeterminate" />
    }

    <div class="table-container">
      <table mat-table [dataSource]="dataSource" matSort>

        <ng-container matColumnDef="doctor_id">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>#</th>
          <td mat-cell *matCellDef="let d">{{ d.doctor_id }}</td>
        </ng-container>

        <ng-container matColumnDef="nombre">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
          <td mat-cell *matCellDef="let d">{{ d.nombre }}</td>
        </ng-container>

        <ng-container matColumnDef="apellido">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Apellido</th>
          <td mat-cell *matCellDef="let d">{{ d.apellido }}</td>
        </ng-container>

        <ng-container matColumnDef="especialidad">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Especialidad</th>
          <td mat-cell *matCellDef="let d">
            <span class="badge-especialidad">{{ d.especialidad }}</span>
          </td>
        </ng-container>

        <ng-container matColumnDef="telefono">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Teléfono</th>
          <td mat-cell *matCellDef="let d">{{ d.telefono }}</td>
        </ng-container>

        <ng-container matColumnDef="acciones">
          <th mat-header-cell *matHeaderCellDef>Acciones</th>
          <td mat-cell *matCellDef="let d">
            <button mat-icon-button color="primary" matTooltip="Editar" (click)="abrirDialog(d)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" matTooltip="Eliminar" (click)="eliminar(d)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="columns"></tr>
        <tr mat-row *matRowDef="let row; columns: columns;"></tr>

        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell no-data" [attr.colspan]="columns.length">
            <mat-icon>search_off</mat-icon>
            <span>No se encontraron doctores</span>
          </td>
        </tr>

      </table>
    </div>

    <mat-paginator [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons />
  </mat-card>

</div>
