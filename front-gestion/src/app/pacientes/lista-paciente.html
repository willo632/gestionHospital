<div class="page">

  <!-- Encabezado -->
  <div class="page-header">
    <div class="page-title">
      <mat-icon>people</mat-icon>
      <h1>Pacientes</h1>
    </div>
    <button mat-flat-button color="primary" (click)="abrirDialog()">
      <mat-icon>person_add</mat-icon> Nuevo paciente
    </button>
  </div>

  <mat-card>
    <!-- Barra de búsqueda -->
    <mat-card-content>
      <mat-form-field appearance="outline" class="search-field">
        <mat-label>Buscar paciente</mat-label>
        <mat-icon matPrefix>search</mat-icon>
        <input matInput (input)="filtrar($event)" placeholder="Nombre, apellido, teléfono…">
      </mat-form-field>
    </mat-card-content>

    <!-- Progress bar -->
    @if (loading()) {
      <mat-progress-bar mode="indeterminate" />
    }

    <!-- Tabla -->
    <div class="table-container">
      <table mat-table [dataSource]="dataSource" matSort>

        <ng-container matColumnDef="paciente_id">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>#</th>
          <td mat-cell *matCellDef="let p">{{ p.paciente_id }}</td>
        </ng-container>

        <ng-container matColumnDef="nombre">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
          <td mat-cell *matCellDef="let p">{{ p.nombre }}</td>
        </ng-container>

        <ng-container matColumnDef="apellido">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Apellido</th>
          <td mat-cell *matCellDef="let p">{{ p.apellido }}</td>
        </ng-container>

        <ng-container matColumnDef="fecha_nacimiento">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Fecha de nacimiento</th>
          <td mat-cell *matCellDef="let p">{{ p.fecha_nacimiento }}</td>
        </ng-container>

        <ng-container matColumnDef="telefono">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Teléfono</th>
          <td mat-cell *matCellDef="let p">{{ p.telefono }}</td>
        </ng-container>

        <ng-container matColumnDef="acciones">
          <th mat-header-cell *matHeaderCellDef>Acciones</th>
          <td mat-cell *matCellDef="let p">
            <button mat-icon-button color="primary" matTooltip="Editar" (click)="abrirDialog(p)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" matTooltip="Eliminar" (click)="eliminar(p)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="columns"></tr>
        <tr mat-row *matRowDef="let row; columns: columns;"></tr>

        <!-- Sin resultados -->
        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell no-data" [attr.colspan]="columns.length">
            <mat-icon>search_off</mat-icon>
            <span>No se encontraron pacientes</span>
          </td>
        </tr>

      </table>
    </div>

    <mat-paginator [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons />
  </mat-card>

</div>
