<h2 mat-dialog-title>
  <mat-icon>{{ data ? 'edit' : 'person_add' }}</mat-icon>
  {{ data ? 'Editar doctor' : 'Nuevo doctor' }}
</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="dialog-form">

    <mat-form-field appearance="outline">
      <mat-label>Nombre</mat-label>
      <input matInput formControlName="nombre" placeholder="Ej. Carlos">
      <mat-error>Campo requerido</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Apellido</mat-label>
      <input matInput formControlName="apellido" placeholder="Ej. Gómez">
      <mat-error>Campo requerido</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Especialidad</mat-label>
      <input matInput formControlName="especialidad" placeholder="Ej. Cardiología">
      <mat-icon matSuffix>medical_services</mat-icon>
      <mat-error>Campo requerido</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Teléfono</mat-label>
      <input matInput formControlName="telefono" placeholder="Ej. 0991234567">
      <mat-icon matSuffix>phone</mat-icon>
      <mat-error>Campo requerido</mat-error>
    </mat-form-field>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancelar</button>
  <button mat-flat-button color="primary" [disabled]="form.invalid" (click)="guardar()">
    <mat-icon>save</mat-icon> Guardar
  </button>
</mat-dialog-actions>
